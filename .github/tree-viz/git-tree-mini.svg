<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="300" height="600"
     viewBox="580 40 200 440">
  <style>
    @keyframes sway {
      0%   { transform: translateX(0); }
      25%  { transform: translateX(3px); }
      50%  { transform: translateX(-2px); }
      75%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }
    .mini-node { animation: sway 4s ease-in-out infinite; }
    .mini-line { stroke-width: 1.5; fill: none; opacity: 0.5; }
  </style>
  <rect width="100%" height="100%" fill="#0a0a1a" rx="6"/>
  <g class="mini-node">
    <line class="mini-line" stroke="#4ade80" x1="600" y1="60" x2="600" y2="100"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="100" x2="600" y2="140"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="140" x2="600" y2="180"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="180" x2="600" y2="220"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="220" x2="600" y2="260"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="260" x2="600" y2="300"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="300" x2="600" y2="340"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="340" x2="600" y2="380"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="380" x2="600" y2="420"/>
    <line class="mini-line" stroke="#4ade80" x1="600" y1="420" x2="600" y2="460"/>
    <circle cx="600" cy="60" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="100" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="140" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="180" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="220" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="260" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="300" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="340" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="380" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="420" r="4" fill="#4ade80" opacity="0.9"/>
    <circle cx="600" cy="460" r="4" fill="#4ade80" opacity="0.9"/>
  </g>
</svg>
